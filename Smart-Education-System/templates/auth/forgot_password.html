<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | EduAI Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; margin: 0; }
        .auth-wrapper { width: 100%; max-width: 460px; padding: 20px; }
        .auth-card { background: #1e293b; border: 1px solid #334155; border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #f59e0b, #ef4444); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 16px; }
        .auth-title { font-size: 1.5rem; font-weight: 800; color: #e2e8f0; margin: 0; }
        .auth-subtitle { font-size: 0.85rem; color: #64748b; margin: 6px 0 0; }
        .form-label { font-size: 0.82rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .auth-input { background: #0f172a !important; border: 1.5px solid #334155 !important; color: #e2e8f0 !important; border-radius: 10px !important; padding: 12px 16px !important; font-size: 0.9rem; transition: all 0.2s; }
        .auth-input:focus { border-color: #f59e0b !important; box-shadow: 0 0 0 3px rgba(245,158,11,0.15) !important; outline: none !important; }
        .auth-input::placeholder { color: #475569 !important; }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap > .bi { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 1rem; pointer-events: none; }
        .input-icon-wrap .auth-input { padding-left: 42px !important; }
        .btn-auth { background: linear-gradient(135deg, #f59e0b, #ef4444); border: none; color: #fff; font-weight: 700; font-size: 0.9rem; padding: 13px; border-radius: 10px; width: 100%; transition: all 0.2s; letter-spacing: 0.02em; }
        .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(245,158,11,0.35); color: #fff; }
        .auth-link { color: #f59e0b; text-decoration: none; font-weight: 600; font-size: 0.85rem;}
        .auth-link:hover { color: #fbbf24; }
        .alert { border-radius: 10px; font-size: 0.85rem; border: none; }
        .alert-danger  { background: rgba(239,68,68,0.12); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.12); color: #86efac; }
        .alert-warning { background: rgba(245,158,11,0.12); color: #fcd34d; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="mb-3">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} d-flex align-items-center gap-2">
            <i class="bi bi-{% if category == 'success' %}check-circle{% elif category == 'danger' %}x-circle{% elif category == 'warning' %}exclamation-triangle{% else %}info-circle{% endif %}-fill"></i>
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">🔑</div>
            <h1 class="auth-title">Forgot Password</h1>
            <p class="auth-subtitle">We'll send a code to reset your password</p>
        </div>

        <form method="POST" action="{{ url_for('auth.forgot_password') }}" id="forgotForm">
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-envelope-fill"></i>
                    <input type="email" name="email" class="form-control auth-input" id="resetEmail"
                           placeholder="you@example.com" required autocomplete="email">
                </div>
            </div>

            <button type="submit" class="btn btn-auth mb-4" id="forgotBtn">
                <i class="bi bi-send-fill me-2"></i>Send Reset Code
            </button>
            
            <div class="text-center">
                <a href="{{ url_for('auth.login') }}" class="auth-link">
                    <i class="bi bi-arrow-left me-1"></i>Back to Login
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', function() {
    var btn = document.getElementById('forgotBtn');
    btn.innerHTML = '<i class="bi bi-arrow-repeat spin me-2" style="display:inline-block;animation:spin 1s linear infinite;"></i>Sending...';
    btn.disabled = true;
});
const style = document.createElement('style');
style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
document.head.appendChild(style);
</script>
</body>
</html>
