<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduAI Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: var(--bg-primary, #0f172a); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; margin: 0; }
        .auth-wrapper { width: 100%; max-width: 460px; padding: 20px; }
        .auth-card { background: var(--bg-card, #1e293b); border: 1px solid var(--border-color, #334155); border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 16px; }
        .auth-title { font-size: 1.5rem; font-weight: 800; color: #e2e8f0; margin: 0; }
        .auth-subtitle { font-size: 0.85rem; color: #64748b; margin: 6px 0 0; }
        .auth-divider { height: 1px; background: #334155; margin: 24px 0; }
        .form-label { font-size: 0.82rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .auth-input { background: #0f172a !important; border: 1.5px solid #334155 !important; color: #e2e8f0 !important; border-radius: 10px !important; padding: 12px 16px !important; font-size: 0.9rem; transition: all 0.2s; }
        .auth-input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,0.15) !important; outline: none !important; }
        .auth-input::placeholder { color: #475569 !important; }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap > .bi { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 1rem; pointer-events: none; }
        .input-icon-wrap .auth-input { padding-left: 42px !important; }
        .btn-auth { background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; color: #fff; font-weight: 700; font-size: 0.9rem; padding: 13px; border-radius: 10px; width: 100%; transition: all 0.2s; letter-spacing: 0.02em; }
        .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(99,102,241,0.35); color: #fff; }
        .btn-auth:active { transform: translateY(0); }
        .auth-link { color: #6366f1; text-decoration: none; font-weight: 600; }
        .auth-link:hover { color: #818cf8; }
        .auth-footer { text-align: center; font-size: 0.82rem; color: #475569; margin-top: 20px; }
        .remember-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .form-check-input:checked { background-color: #6366f1; border-color: #6366f1; }
        .form-check-label { font-size: 0.82rem; color: #94a3b8; }
        .alert { border-radius: 10px; font-size: 0.85rem; border: none; }
        .alert-danger  { background: rgba(239,68,68,0.12); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.12); color: #86efac; }
        .alert-warning { background: rgba(245,158,11,0.12); color: #fcd34d; }
        .alert-info    { background: rgba(99,102,241,0.12); color: #a5b4fc; }
        .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #475569; cursor: pointer; font-size: 1rem; background: none; border: none; padding: 0; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="mb-3">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} d-flex align-items-center gap-2">
            <i class="bi bi-{% if category == 'success' %}check-circle{% elif category == 'danger' %}x-circle{% elif category == 'warning' %}exclamation-triangle{% else %}info-circle{% endif %}-fill"></i>
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">🎓</div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to EduAI Smart Analytics</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-envelope-fill"></i>
                    <input type="email" name="email" class="form-control auth-input" id="loginEmail"
                           placeholder="you@example.com" required autocomplete="email">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-icon-wrap" style="position:relative;">
                    <i class="bi bi-lock-fill"></i>
                    <input type="password" name="password" class="form-control auth-input" id="loginPw"
                           placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-pw" onclick="togglePw('loginPw', this)">
                        <i class="bi bi-eye-fill"></i>
                    </button>
                </div>
            </div>

            <div class="remember-row">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <a href="{{ url_for('auth.forgot_password') }}" class="auth-link" style="font-size: 0.82rem;">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-auth" id="loginBtn">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <div class="auth-divider"></div>

        <div class="auth-footer">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" class="auth-link">Create one free</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePw(id, btn) {
    var inp = document.getElementById(id);
    var icon = btn.querySelector('i');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash-fill';
    } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye-fill';
    }
}
document.getElementById('loginForm').addEventListener('submit', function() {
    var btn = document.getElementById('loginBtn');
    btn.innerHTML = '<i class="bi bi-arrow-repeat spin me-2"></i>Signing in...';
    btn.disabled = true;
});
</script>
</body>
</html>
