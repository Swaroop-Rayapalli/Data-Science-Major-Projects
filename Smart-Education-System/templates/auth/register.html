<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | EduAI Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: var(--bg-primary, #0f172a); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; margin: 0; padding: 20px 0; }
        .auth-wrapper { width: 100%; max-width: 480px; padding: 20px; }
        .auth-card { background: var(--bg-card, #1e293b); border: 1px solid var(--border-color, #334155); border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 16px; }
        .auth-title { font-size: 1.5rem; font-weight: 800; color: #e2e8f0; margin: 0; }
        .auth-subtitle { font-size: 0.85rem; color: #64748b; margin: 6px 0 0; }
        .auth-divider { height: 1px; background: #334155; margin: 24px 0; }
        .form-label { font-size: 0.82rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .auth-input { background: #0f172a !important; border: 1.5px solid #334155 !important; color: #e2e8f0 !important; border-radius: 10px !important; padding: 12px 16px !important; font-size: 0.9rem; transition: all 0.2s; }
        .auth-input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,0.15) !important; }
        .auth-input::placeholder { color: #475569 !important; }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap > .bi { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 1rem; pointer-events: none; }
        .input-icon-wrap .auth-input { padding-left: 42px !important; }
        .btn-auth { background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; color: #fff; font-weight: 700; font-size: 0.9rem; padding: 13px; border-radius: 10px; width: 100%; transition: all 0.2s; }
        .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(99,102,241,0.35); color: #fff; }
        .auth-link { color: #6366f1; text-decoration: none; font-weight: 600; }
        .auth-link:hover { color: #818cf8; }
        .auth-footer { text-align: center; font-size: 0.82rem; color: #475569; margin-top: 20px; }
        .pw-strength { height: 4px; border-radius: 2px; background: #334155; margin-top: 6px; overflow: hidden; }
        .pw-strength-bar { height: 100%; border-radius: 2px; transition: all 0.3s; width: 0%; }
        .pw-hint { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
        .alert { border-radius: 10px; font-size: 0.85rem; border: none; }
        .alert-danger  { background: rgba(239,68,68,0.12); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.12); color: #86efac; }
        .alert-warning { background: rgba(245,158,11,0.12); color: #fcd34d; }
        .alert-info    { background: rgba(99,102,241,0.12); color: #a5b4fc; }
        .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #475569; cursor: pointer; font-size: 1rem; background: none; border: none; padding: 0; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="mb-3">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} d-flex align-items-center gap-2">
            <i class="bi bi-{% if category == 'success' %}check-circle{% elif category == 'danger' %}x-circle{% elif category == 'warning' %}exclamation-triangle{% else %}info-circle{% endif %}-fill"></i>
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">🎓</div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join EduAI Smart Analytics Platform</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" id="registerForm">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-person-fill"></i>
                    <input type="text" name="name" class="form-control auth-input" id="regName"
                           placeholder="Your full name" required autocomplete="name">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-envelope-fill"></i>
                    <input type="email" name="email" class="form-control auth-input" id="regEmail"
                           placeholder="you@example.com" required autocomplete="email">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-icon-wrap" style="position:relative;">
                    <i class="bi bi-lock-fill"></i>
                    <input type="password" name="password" class="form-control auth-input" id="regPw"
                           placeholder="Min 8 characters" required autocomplete="new-password"
                           oninput="checkStrength(this.value)">
                    <button type="button" class="toggle-pw" onclick="togglePw('regPw', this)">
                        <i class="bi bi-eye-fill"></i>
                    </button>
                </div>
                <div class="pw-strength mt-2"><div class="pw-strength-bar" id="pwBar"></div></div>
                <div class="pw-hint" id="pwHint">Enter a password to see strength</div>
            </div>

            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <div class="input-icon-wrap" style="position:relative;">
                    <i class="bi bi-shield-lock-fill"></i>
                    <input type="password" name="confirm_password" class="form-control auth-input" id="regPwConf"
                           placeholder="Repeat password" required autocomplete="new-password">
                    <button type="button" class="toggle-pw" onclick="togglePw('regPwConf', this)">
                        <i class="bi bi-eye-fill"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-auth" id="regBtn">
                <i class="bi bi-person-plus-fill me-2"></i>Create Account & Send OTP
            </button>
        </form>

        <div class="auth-divider"></div>
        <div class="auth-footer">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" class="auth-link">Sign in</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePw(id, btn) {
    var inp = document.getElementById(id);
    var icon = btn.querySelector('i');
    if (inp.type === 'password') { inp.type = 'text'; icon.className = 'bi bi-eye-slash-fill'; }
    else { inp.type = 'password'; icon.className = 'bi bi-eye-fill'; }
}

function checkStrength(pw) {
    var bar = document.getElementById('pwBar');
    var hint = document.getElementById('pwHint');
    var score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    var colors = ['#ef4444','#f59e0b','#f59e0b','#22c55e','#22c55e'];
    var labels = ['Very Weak','Weak','Fair','Strong','Very Strong'];
    bar.style.width = (score * 20) + '%';
    bar.style.background = colors[Math.max(0, score-1)];
    hint.textContent = score > 0 ? labels[score-1] : 'Enter a password';
    hint.style.color = score > 0 ? colors[Math.max(0, score-1)] : '#64748b';
}

document.getElementById('registerForm').addEventListener('submit', function(e) {
    var pw = document.getElementById('regPw').value;
    var conf = document.getElementById('regPwConf').value;
    if (pw !== conf) {
        e.preventDefault();
        alert('Passwords do not match!');
        return;
    }
    var btn = document.getElementById('regBtn');
    btn.innerHTML = '<i class="bi bi-arrow-repeat spin me-2"></i>Creating account...';
    btn.disabled = true;
});
</script>
</body>
</html>
