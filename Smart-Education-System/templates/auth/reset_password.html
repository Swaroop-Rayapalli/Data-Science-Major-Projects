<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | EduAI Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; margin: 0; padding: 20px 0; }
        .auth-wrapper { width: 100%; max-width: 480px; padding: 20px; }
        .auth-card { background: #1e293b; border: 1px solid #334155; border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #f59e0b, #ef4444); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 16px; }
        .auth-title { font-size: 1.5rem; font-weight: 800; color: #e2e8f0; margin: 0; }
        .auth-subtitle { font-size: 0.85rem; color: #64748b; margin: 6px 0 0; }
        .email-highlight { color: #f59e0b; font-weight: 600; }
        
        .otp-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
        .otp-box { width: 45px; height: 55px; background: #0f172a; border: 2px solid #334155; border-radius: 10px; color: #e2e8f0; font-size: 1.25rem; font-weight: 700; text-align: center; font-family: monospace; transition: all 0.2s; outline: none; }
        .otp-box:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
        .otp-box.filled { border-color: #fbbf24; background: rgba(245,158,11,0.08); }
        
        .form-label { font-size: 0.82rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .auth-input { background: #0f172a !important; border: 1.5px solid #334155 !important; color: #e2e8f0 !important; border-radius: 10px !important; padding: 12px 16px !important; font-size: 0.9rem; transition: all 0.2s; }
        .auth-input:focus { border-color: #f59e0b !important; box-shadow: 0 0 0 3px rgba(245,158,11,0.15) !important; outline: none !important; }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap > .bi { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 1rem; pointer-events: none; }
        .input-icon-wrap .auth-input { padding-left: 42px !important; }
        
        .btn-auth { background: linear-gradient(135deg, #f59e0b, #ef4444); border: none; color: #fff; font-weight: 700; font-size: 0.9rem; padding: 13px; border-radius: 10px; width: 100%; transition: all 0.2s; }
        .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(245,158,11,0.35); color: #fff; }
        
        .btn-resend { background: transparent; border: 1.5px solid #334155; color: #94a3b8; font-weight: 600; font-size: 0.85rem; padding: 8px; border-radius: 10px; width: auto; transition: all 0.2s; }
        .btn-resend:hover:not(:disabled) { border-color: #f59e0b; color: #fbbf24; }
        
        .countdown { font-size: 0.82rem; color: #64748b; margin-top: 10px; text-align: center; }
        .countdown span { color: #f59e0b; font-weight: 700; }
        
        .auth-link { color: #f59e0b; text-decoration: none; font-weight: 600; font-size: 0.85rem;}
        .auth-link:hover { color: #fbbf24; }
        .alert { border-radius: 10px; font-size: 0.85rem; border: none; }
        .alert-danger  { background: rgba(239,68,68,0.12); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.12); color: #86efac; }
        .alert-warning { background: rgba(245,158,11,0.12); color: #fcd34d; }
        .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #475569; cursor: pointer; font-size: 1rem; background: none; border: none; padding: 0; pointer-events: auto; }
        
        .pw-strength { height: 4px; border-radius: 2px; background: #334155; margin-top: 6px; overflow: hidden; }
        .pw-strength-bar { height: 100%; border-radius: 2px; transition: all 0.3s; width: 0%; }
        .pw-hint { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="mb-3">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} d-flex align-items-center gap-2">
            <i class="bi bi-{% if category == 'success' %}check-circle{% elif category == 'danger' %}x-circle{% elif category == 'warning' %}exclamation-triangle{% else %}info-circle{% endif %}-fill"></i>
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">🔒</div>
            <h1 class="auth-title">Create New Password</h1>
            <p class="auth-subtitle">Code sent to <span class="email-highlight">{{ email }}</span></p>
        </div>

        <form method="POST" action="{{ url_for('auth.reset_password') }}" id="resetForm">
            <input type="hidden" name="action" value="reset">
            <input type="hidden" name="otp" id="otpHidden">

            <label class="form-label text-center d-block">6-Digit Reset Code</label>
            <div class="otp-inputs" id="otpInputs">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" id="d0" autocomplete="off">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" id="d1" autocomplete="off">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" id="d2" autocomplete="off">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" id="d3" autocomplete="off">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" id="d4" autocomplete="off">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" id="d5" autocomplete="off">
            </div>

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-lock-fill"></i>
                    <input type="password" name="new_password" class="form-control auth-input" id="regPw"
                           placeholder="Min 8 characters" required autocomplete="new-password"
                           oninput="checkStrength(this.value)">
                    <button type="button" class="toggle-pw" onclick="togglePw('regPw', this)">
                        <i class="bi bi-eye-fill"></i>
                    </button>
                </div>
                <div class="pw-strength mt-2"><div class="pw-strength-bar" id="pwBar"></div></div>
                <div class="pw-hint" id="pwHint">Enter a password to see strength</div>
            </div>

            <div class="mb-4">
                <label class="form-label">Confirm New Password</label>
                <div class="input-icon-wrap">
                    <i class="bi bi-shield-lock-fill"></i>
                    <input type="password" name="confirm_password" class="form-control auth-input" id="regPwConf"
                           placeholder="Repeat new password" required autocomplete="new-password">
                    <button type="button" class="toggle-pw" onclick="togglePw('regPwConf', this)">
                        <i class="bi bi-eye-fill"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-auth mb-3" id="resetBtn">
                <i class="bi bi-check-circle-fill me-2"></i>Reset Password
            </button>
        </form>

        <div class="text-center mb-3">
            <form method="POST" action="{{ url_for('auth.reset_password') }}" id="resendForm" class="d-inline-block">
                <input type="hidden" name="action" value="resend">
                <button type="submit" class="btn-resend" id="resendBtn" disabled>
                    <i class="bi bi-arrow-clockwise me-1"></i>Resend Code
                </button>
            </form>
            <div class="countdown" id="countdownWrap">Available in <span id="countdownTimer">60</span>s</div>
        </div>

        <div class="text-center mt-2">
            <a href="{{ url_for('auth.login') }}" class="auth-link">
                <i class="bi bi-arrow-left me-1"></i>Back to Login
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* OTP Logic */
var boxes = [0,1,2,3,4,5].map(function(i){ return document.getElementById('d'+i); });
boxes.forEach(function(box, idx) {
    box.addEventListener('input', function() {
        var v = this.value.replace(/\D/g, '');
        this.value = v ? v[0] : '';
        this.classList.toggle('filled', !!this.value);
        if (this.value && idx < 5) boxes[idx+1].focus();
        updateHidden();
    });
    box.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !this.value && idx > 0) {
            boxes[idx-1].value = '';
            boxes[idx-1].classList.remove('filled');
            boxes[idx-1].focus();
            updateHidden();
        }
    });
});
document.getElementById('d0').addEventListener('paste', function(e) {
    e.preventDefault();
    var pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
    pasted.split('').forEach(function(ch, i) {
        if (boxes[i]) { boxes[i].value = ch; boxes[i].classList.add('filled'); }
    });
    if (boxes[pasted.length-1]) boxes[pasted.length-1].focus();
    updateHidden();
});
function updateHidden() { document.getElementById('otpHidden').value = boxes.map(b=>b.value).join(''); }

/* Password Toggle & Strength */
function togglePw(id, btn) {
    var inp = document.getElementById(id);
    var icon = btn.querySelector('i');
    if (inp.type === 'password') { inp.type = 'text'; icon.className = 'bi bi-eye-slash-fill'; }
    else { inp.type = 'password'; icon.className = 'bi bi-eye-fill'; }
}

function checkStrength(pw) {
    var bar = document.getElementById('pwBar');
    var hint = document.getElementById('pwHint');
    var score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    var colors = ['#ef4444','#f59e0b','#f59e0b','#22c55e','#22c55e'];
    var labels = ['Very Weak','Weak','Fair','Strong','Very Strong'];
    bar.style.width = (score * 20) + '%';
    bar.style.background = colors[Math.max(0, score-1)];
    hint.textContent = score > 0 ? labels[score-1] : 'Enter a password';
    hint.style.color = score > 0 ? colors[Math.max(0, score-1)] : '#64748b';
}

document.getElementById('resetForm').addEventListener('submit', function(e) {
    updateHidden();
    var pw = document.getElementById('regPw').value;
    var conf = document.getElementById('regPwConf').value;
    if (pw !== conf) {
        e.preventDefault();
        alert('Passwords do not match!');
        return;
    }
    var btn = document.getElementById('resetBtn');
    btn.innerHTML = '<i class="bi bi-arrow-repeat spin me-2"></i>Resetting...';
    btn.disabled = true;
});

/* Countdown Timer */
var secs = 60;
var timer = setInterval(function() {
    secs--;
    document.getElementById('countdownTimer').textContent = secs;
    if (secs <= 0) {
        clearInterval(timer);
        document.getElementById('countdownWrap').style.display = 'none';
        document.getElementById('resendBtn').disabled = false;
    }
}, 1000);

const style = document.createElement('style');
style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } } .spin { display:inline-block; animation:spin 1s linear infinite; }`;
document.head.appendChild(style);

boxes[0].focus();
</script>
</body>
</html>
