<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection - AI Healthcare</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/fraud.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html">← Back to Dashboard</a>
        <span>Fraud Detection Module</span>
    </nav>

    <div class="container">
        <h1>Insurance Fraud Detection</h1>
        <p>Analyze medical claims for potential fraud.</p>

        <div class="card">
            <form id="fraudForm">
                <div class="form-group">
                    <label>Claimant Name</label>
                    <input type="text" id="claimant" required value="John Doe">
                </div>
                <div class="form-group">
                    <label>Time (Seconds elapsed)</label>
                    <input type="number" id="time" required value="0">
                </div>
                <div class="form-group">
                    <label>Claim Amount ($)</label>
                    <input type="number" step="0.01" id="amount" required value="150.00">
                </div>
                <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 1.5rem;">Note: Background PCA features
                    V1-V28 will be simulated for this demo.</p>
                <button type="submit" class="btn">Analyze Claim</button>
            </form>

            <div id="resultBox" class="result-box">
                <h2 id="resultText"></h2>
                <p id="probabilityText"></p>
                <p style="font-size: 0.8rem; margin-top: 1rem; opacity: 0.7;">Claim ID: <span id="predId"></span> (Saved
                    to DB)</p>
            </div>
        </div>
    </div>

    <script src="js/fraud.js"></script>

    <footer class="footer">
        &copy; 2026 AI Healthcare Intelligence System. All rights reserved to Swaroop Rayapalli.
    </footer>
</body>

</html>
