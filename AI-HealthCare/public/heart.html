<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction - AI Healthcare</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/heart.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html">← Back to Dashboard</a>
        <span>Heart Disease Module</span>
    </nav>

    <div class="container">
        <h1>Heart Disease Prediction</h1>
        <p>Enter patient vitals below to evaluate cardiovascular risk.</p>

        <div class="card">
            <form id="heartForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" required value="45">
                    </div>
                    <div class="form-group">
                        <label>Sex (1 = Male, 0 = Female)</label>
                        <select id="sex">
                            <option value="1">Male</option>
                            <option value="0">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Chest Pain Type (0-3)</label>
                        <input type="number" id="cp" min="0" max="3" required value="1">
                    </div>
                    <div class="form-group">
                        <label>Resting Blood Pressure</label>
                        <input type="number" id="trestbps" required value="120">
                    </div>
                    <div class="form-group">
                        <label>Cholesterol (mg/dl)</label>
                        <input type="number" id="chol" required value="200">
                    </div>
                    <div class="form-group">
                        <label>Fasting Blood Sugar > 120 (1=True, 0=False)</label>
                        <select id="fbs">
                            <option value="0">False</option>
                            <option value="1">True</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Resting ECG Results (0-2)</label>
                        <input type="number" id="restecg" min="0" max="2" required value="0">
                    </div>
                    <div class="form-group">
                        <label>Max Heart Rate Achieved</label>
                        <input type="number" id="thalach" required value="150">
                    </div>
                    <div class="form-group">
                        <label>Exercise Induced Angina (1=Yes, 0=No)</label>
                        <select id="exang">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>ST Depression (Oldpeak)</label>
                        <input type="number" step="0.1" id="oldpeak" required value="1.0">
                    </div>
                    <div class="form-group">
                        <label>Slope of Peak Exercise ST (0-2)</label>
                        <input type="number" id="slope" min="0" max="2" required value="1">
                    </div>
                    <div class="form-group">
                        <label>Number of Major Vessels (0-4)</label>
                        <input type="number" id="ca" min="0" max="4" required value="0">
                    </div>
                    <div class="form-group">
                        <label>Thalassemia (0-3)</label>
                        <input type="number" id="thal" min="0" max="3" required value="2">
                    </div>
                </div>
                <button type="submit" class="btn">Predict Risk</button>
            </form>

            <div id="resultBox" class="result-box">
                <h2 id="resultText"></h2>
                <p id="probabilityText"></p>
                <p style="font-size: 0.8rem; margin-top: 1rem; opacity: 0.7;">Prediction ID: <span id="predId"></span>
                    (Saved to DB)</p>
            </div>
        </div>
    </div>

    <script src="js/heart.js"></script>

    <footer class="footer">
        &copy; 2026 AI Healthcare Intelligence System. All rights reserved to Swaroop Rayapalli.
    </footer>
</body>

</html>
